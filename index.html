<!doctype html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Todo List</title><script defer="defer" src="app.bundle.js"></script><link href="app.f916a246b0e814d2cb24.css" rel="stylesheet"></head><body><div class="container"><div class="header">Todo List</div><div class="main-content"><button class="add-toDos-button">+</button><div class="toDo-grid"></div></div><div class="sidebar"><h1>Projects</h1><button class="add-projects-button">+</button><div class="projects-grid"></div></div></div><dialog class="create-toDo"><form action="#" method="post"><label for="title">Todo Title:</label> <input id="title" name="title" placeholder="Go to the supermarket" required> <label for="description">Todo Description:</label> <textarea rows="15" cols="25" id="description" required></textarea> <label for="dueDate">Due Date:</label> <input type="date" id="dueDate" name="date" required> <label for="priority" name="priority">Todo Priority:</label> <select id="priority" name="priority" required><option value="" disabled="disabled" selected="selected">Select priority</option><option value="high">High</option><option value="medium">Medium</option><option value="low">Low</option></select> <label for="notes">Todo Notes:</label> <input id="notes" name="notes" placeholder="..." required><div class="checklist-utilities"><label for="add-checklist-button">Add checklist item:</label> <button type="button" id="add-checklist-button">+</button></div><div id="checklist-items"></div><label for="complete">Complete? (cannot be undone)</label> <input type="checkbox" id="complete" name="complete"> <button type="submit" id="submit-button">Submit all data and close form</button></form><button id="close-toDo-form">Close Form (without adding a new Todo)</button></dialog><dialog class="update-toDo"><form action="#" method="post"><label for="changed-title">Todo Title:</label> <input id="changed-title" name="title" placeholder="Go to the supermarket" required> <label for="changed-description">Todo Description:</label> <textarea rows="15" cols="25" id="changed-description" required></textarea> <label for="changed-dueDate">Due Date:</label> <input type="date" id="changed-dueDate" name="date" required> <label for="changed-priority" name="priority">Todo Priority:</label> <select id="changed-priority" name="priority" required><option value="" disabled="disabled" selected="selected">Select priority</option><option value="high">High</option><option value="medium">Medium</option><option value="low">Low</option></select> <label for="changed-notes">Todo Notes:</label> <input id="changed-notes" name="notes" placeholder="..." required><div class="checklist-utilities"><label for="changed-add-checklist-button">Add checklist item:</label> <button type="button" id="changed-add-checklist-button">+</button></div><div id="changed-checklist-items"></div><label for="changed-complete">Complete? (cannot be undone)</label> <input type="checkbox" id="changed-complete" name="complete"> <button type="submit" id="changed-submit-button">Submit all data and close form</button></form></dialog><dialog class="create-project"><form action="#" method="post"><label for="project-title">Project Title:</label> <input id="project-title" name="title" required> <label for="default-project">Default?</label> <input type="checkbox" id="default-project" name="default-project"> <button type="submit" id="submit-project-button">Submit all data and close form</button></form><button id="close-project-form">Close Form (without adding a new project)</button></dialog></body></html>
